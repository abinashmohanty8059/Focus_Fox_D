<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Fox Desktop</title>
    <link rel="stylesheet" href="/styles.css?v=1.0.1" />
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Marked.js Markdown Parser CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <div id="app-root">
      
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon" id="brand-logo-container">
            <img src="/assets/Foxy.png" alt="🦊" onerror="this.outerHTML='🦊'"/>
          </div>
          <span class="brand-name">Focus Fox</span>
        </div>
        <div class="sidebar-toggle-row">
          <!-- Mini Stopwatch -->
          <div class="mini-stopwatch" id="mini-stopwatch">
            <div class="stopwatch-time" id="stopwatch-display">00:00</div>
            <div class="stopwatch-controls">
              <button class="stopwatch-btn" id="stopwatch-play-btn" title="Start/Pause Stopwatch">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </button>
              <button class="stopwatch-btn" id="stopwatch-reset-btn" title="Reset Stopwatch">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>
              </button>
            </div>
          </div>

          <button class="collapse-sidebar-btn" id="collapse-sidebar-btn" title="Toggle Sidebar">
            <svg viewBox="0 0 24 24" id="sidebar-toggle-icon">
              <polyline points="11 17 6 12 11 7"></polyline>
              <polyline points="18 17 13 12 18 7"></polyline>
            </svg>
          </button>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-item active" id="nav-selection" data-target="selection">
            <svg viewBox="0 0 24 24">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
            </svg>
            <span>Academic Selection</span>
          </div>

          <div class="nav-item" id="nav-dashboard" data-target="dashboard" style="display: none;">
            <svg viewBox="0 0 24 24">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            <span>Subject Dashboard</span>
          </div>

          <div class="nav-item" id="nav-syllabus" data-target="syllabus" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              <path d="M6 6h10M6 10h10M6 14h8"/>
            </svg>
            <span>Syllabus</span>
          </div>

          <div class="nav-item" id="nav-algo" data-target="algo-topics">
            <svg viewBox="0 0 24 24">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            <span>Algo &amp; Code</span>
          </div>

          <div class="nav-item" id="nav-settings" data-target="settings">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Settings</span>
          </div>
        </nav>


        <!-- Mini Music Player -->
        <div class="mini-music-player" id="mini-music-player">
          <div class="player-controls">
            <button class="player-btn" id="player-prev-btn" title="Previous Track">
              <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
            </button>
            <button class="player-btn play-btn" id="player-play-btn" title="Play">
              <svg viewBox="0 0 24 24" id="play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="player-btn" id="player-next-btn" title="Next Track">
              <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
            </button>
          </div>
          <div class="player-progress-container">
            <div class="player-progress-bar" id="player-progress-bar">
              <div class="player-progress-fill" id="player-progress-fill"></div>
            </div>
            <div class="player-time" id="player-time">0:00 / 0:00</div>
          </div>
          <div class="player-volume-container">
            <svg viewBox="0 0 24 24" class="volume-icon"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <input type="range" class="volume-slider" id="player-volume-slider" min="0" max="1" step="0.05" value="1" title="Volume">
          </div>
        </div>

        <div class="sidebar-footer">
          <div class="user-tag">
            <div class="user-avatar">FF</div>
            <div class="user-info">
              <span class="user-name">Guest Student</span>
              <span class="user-role">Offline Mode</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Application Container -->
      <main class="main-content">
        
        <!-- Header -->
        <header class="app-header">
          <div class="header-title-area">
            <button class="back-btn" id="header-back-btn" style="display: none;" title="Go Back">
              <svg viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
            </button>
            <div>
              <h2 class="header-title" id="header-title-text">Focus Fox Dashboard</h2>
              <span class="header-subtitle" id="header-subtitle-text">Study Smarter, Not Harder</span>
            </div>
          </div>

          <div class="header-actions">
            <!-- View on LeetCode Button -->
            <button class="back-btn" id="header-leetcode-btn" style="display: none; width: auto; height: 38px; padding: 0 16px; border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem; align-items: center; gap: 8px;" title="View on LeetCode">
              <span>View on LeetCode</span>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" style="display: inline-block;">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>

             <!-- Theme Toggle -->
             <div class="header-filters" id="header-filters" style="display: none; align-items: center; gap: 8px; margin-right: 12px;">
               <select class="header-select" id="header-branch-select"></select>
               <select class="header-select" id="header-semester-select"></select>
             </div>
             <button class="theme-toggle-btn" id="theme-toggle-btn" title="Toggle Theme">
               <!-- Sun / Moon SVG dynamically switched in app.js -->
               <svg viewBox="0 0 24 24" id="theme-icon">
                 <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
               </svg>
             </button>
          </div>
        </header>

        <!-- Dynamic Content View Container -->
        <div id="view-container" class="view-container">
          <!-- Views will be injected here dynamically by app.js -->
          <div class="spinner"></div>
        </div>
      </main>
    </div>

    <!-- Image Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <button class="lightbox-close" id="lightbox-close-btn">&times;</button>
      <div class="lightbox-content">
        <img class="lightbox-img" id="lightbox-img" src="" alt="Lightbox View" />
      </div>
    </div>


    <!-- Main Entry Module Script -->
    <script type="module" src="/js/app.js?v=1.0.1"></script>
  </body>
</html>
